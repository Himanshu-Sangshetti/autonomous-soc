# Baseline pipeline with no SOC tooling: checkout, Node, npm install (scripts allowed),
# test. Use for "before" demos versus the protected soc-pipeline workflow.
name: Naked Pipeline (Zero Protection)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: demo/app
        run: npm install
      - name: Build
        working-directory: demo/app
        run: npm test
      - name: Report
        run: echo "Build passed. No security checks. No monitoring. No visibility."
