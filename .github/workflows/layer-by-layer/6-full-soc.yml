name: "Layer 6: + AI Triage (Full SOC)"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario'
        required: false
        default: 'clean'
        type: choice
        options: [clean, malicious-dep, leaked-secret, vuln-dep]

permissions:
  contents: read

jobs:
  layer6:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply scenario
        if: github.event.inputs.scenario != 'clean'
        run: cp "demo/scenarios/${{ github.event.inputs.scenario }}/package.json" demo/app/package.json 2>/dev/null || true

      - name: Install (safe)
        working-directory: demo/app
        run: npm install --ignore-scripts

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin 2>/dev/null
          syft packages dir:demo/app -o cyclonedx-json --file=/tmp/soc-sbom-current.json

      - name: SBOM Diff
        run: |
          echo "[]" > /tmp/soc-signals.json
          python3 tools/sbom-diff.py /tmp/soc-sbom-current.json --signals-file /tmp/soc-signals.json || true

      - name: Provenance Check
        run: |
          cd demo/app && npm audit signatures > /tmp/provenance-output.txt 2>&1 || true
          cat /tmp/provenance-output.txt

      - name: Vulnerability Scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin 2>/dev/null
          grype sbom:/tmp/soc-sbom-current.json -o json --file=/tmp/grype-output.json || true
          grype sbom:/tmp/soc-sbom-current.json --fail-on high || true

      - name: Secret Scan
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v\${GITLEAKS_VERSION}/gitleaks_\${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks 2>/dev/null
          gitleaks detect --source demo/app --no-git --report-format json --report-path /tmp/gitleaks-output.json || true

      - name: Collect Signals
        run: bash tools/collect-signals.sh
        env:
          SIGNALS_FILE: /tmp/soc-signals.json
          GRYPE_OUTPUT: /tmp/grype-output.json
          GITLEAKS_OUTPUT: /tmp/gitleaks-output.json
          PROVENANCE_OUTPUT: /tmp/provenance-output.txt

      - name: AI Triage
        run: |
          pip install anthropic pyyaml --quiet --break-system-packages 2>/dev/null || pip install anthropic pyyaml --quiet
          python3 tools/ai-triage.py --signals-file /tmp/soc-signals.json --policy moderate
        env:
          ANTHROPIC_API_KEY: \${{ secrets.ANTHROPIC_API_KEY }}
