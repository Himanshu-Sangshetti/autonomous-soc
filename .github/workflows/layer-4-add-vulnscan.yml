name: "Layer 4: + Vulnerability Scanning"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario'
        required: false
        default: 'clean'
        type: choice
        options: [clean, malicious-dep, leaked-secret, vuln-dep]

permissions:
  contents: read

jobs:
  layer4:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply scenario
        if: github.event.inputs.scenario != 'clean'
        run: cp "demo/scenarios/${{ github.event.inputs.scenario }}/package.json" demo/app/package.json 2>/dev/null || true

      - name: Install (safe)
        working-directory: demo/app
        run: npm install --ignore-scripts

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin 2>/dev/null
          syft packages dir:demo/app -o cyclonedx-json --file=/tmp/soc-sbom-current.json

      - name: SBOM Diff
        run: |
          echo "[]" > /tmp/soc-signals.json
          python3 tools/sbom-diff.py /tmp/soc-sbom-current.json --signals-file /tmp/soc-signals.json || true

      - name: Provenance Check
        run: |
          cd demo/app && npm audit signatures > /tmp/provenance-output.txt 2>&1 || true
          cat /tmp/provenance-output.txt

      - name: Vulnerability Scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin 2>/dev/null
          grype sbom:/tmp/soc-sbom-current.json -o json --file=/tmp/grype-output.json || true
          grype sbom:/tmp/soc-sbom-current.json --fail-on high || true
