# Full demo pipeline: Harden-Runner, Node, optional attack scenarios, safe npm install,
# then the Autonomous SOC composite action. Uploads SOC Markdown/JSON reports as artifacts.
name: Autonomous SOC Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Attack scenario to test'
        required: false
        default: 'clean'
        type: choice
        options:
          - clean
          - malicious-dep
          - leaked-secret
          - vuln-dep

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  soc:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply scenario (if selected)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.scenario != 'clean'
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          echo "Applying scenario: $SCENARIO"
          cp "demo/scenarios/${SCENARIO}/package.json" demo/app/package.json 2>/dev/null || true
          cp "demo/scenarios/${SCENARIO}/mcp-config.json" demo/app/mcp-config.json 2>/dev/null || true

      - name: Install dependencies (safe)
        working-directory: demo/app
        run: npm install --ignore-scripts

      - name: Run Autonomous SOC
        uses: ./
        with:
          policy: moderate
          fail-on-block: 'true'
          working-directory: demo/app
          apply-npm-audit-fix: 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload SOC report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc-report-${{ github.run_id }}
          path: |
            /tmp/soc-report.md
            /tmp/soc-report.json
          if-no-files-found: ignore
