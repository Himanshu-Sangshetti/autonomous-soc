# Progressive talk demo (1/6): StepSecurity Harden-Runner + checkout + Node + scenario + safe install only.
name: "Layer 1: Runtime Monitoring Only"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario'
        required: false
        default: 'clean'
        type: choice
        options: [clean, malicious-dep, leaked-secret, vuln-dep]

permissions:
  contents: read

jobs:
  layer1:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply scenario
        if: github.event.inputs.scenario != 'clean'
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          cp "demo/scenarios/${SCENARIO}/package.json" demo/app/package.json 2>/dev/null || true
          cp "demo/scenarios/${SCENARIO}/.env" demo/app/.env 2>/dev/null || true
          cp "demo/scenarios/${SCENARIO}/mcp-config.json" demo/app/mcp-config.json 2>/dev/null || true

      - name: Install (scripts enabled — postinstall hooks will run)
        working-directory: demo/app
        run: |
          echo "Scripts ENABLED: postinstall hooks will execute."
          echo "Harden-Runner monitors all outbound network connections..."
          npm install
